version: '3'

tasks:
  ci:
    desc: "Full CI pipeline: vet + build + test with coverage (as CI runs it)"
    cmds:
      - task: lint
      - task: build
      - task: test

  test:
    desc: "Run tests with coverage (requires mke2fs/e2fsck/debugfs from e2fsprogs)"
    cmds:
      # The `test` package drives mke2fs/e2fsck/debugfs round-trips and the
      # root package exercises the journalled write path, both of which are
      # dominated by real-time grace periods, so allow a generous timeout.
      # -coverpkg=./... attributes the external `test` package's coverage of
      # the library to the combined profile.
      - go test -mod=mod -coverpkg=./... -coverprofile=cover.out -timeout 1200s ./...

  build:
    desc: "Build (library — compile check only)"
    cmds:
      - go build -mod=mod ./...

  lint:
    desc: "Vet the package"
    cmds:
      - go vet -mod=mod ./...

  install-deps:
    desc: "Install mke2fs (required for some tests)"
    cmds:
      - brew install e2fsprogs

  test-stress:
    desc: "Run stress tests (requires 'stress' build tag)"
    cmds:
      - go test -mod=mod -v -tags=test,stress ./...
