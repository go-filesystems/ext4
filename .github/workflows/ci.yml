name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native runners: full lint + build + test (coverage) via the Taskfile,
  # exactly as a developer runs it locally. e2fsprogs (mke2fs / e2fsck /
  # debugfs) is installed so the image-round-trip tests actually run instead
  # of skipping; the journalled write path is exercised at full fidelity
  # (no -short). This is where the COVERAGE_FLOOR gate is enforced.
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    env:
      # Coverage floor enforced on the combined (-coverpkg=./...) profile.
      # Measured at 70.6% on a full e2fsprogs-backed run with the network
      # image tests skipped (the CI condition); the floor keeps margin for
      # run-to-run variance from the skip-on-missing-tool/image tests.
      COVERAGE_FLOOR: "65.0"
    steps:
      - name: Checkout ext4
        uses: actions/checkout@v4
        with:
          path: ext4

      # go.mod carries `replace github.com/go-filesystems/interface =>
      # ../interface`, so the sibling module must sit next to this one.
      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Install e2fsprogs (mke2fs / e2fsck / debugfs)
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: ext4/go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Taskfile ci
        working-directory: ext4
        run: task ci

      - name: Enforce coverage floor
        working-directory: ext4
        run: |
          set -euo pipefail
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (floor: ${COVERAGE_FLOOR}%)"
          awk -v t="$total" -v f="$COVERAGE_FLOOR" \
            'BEGIN { if (t+0 < f+0) { printf "coverage %.1f%% below floor %.1f%%\n", t, f; exit 1 } }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.arch }}
          path: ext4/cover.out
          if-no-files-found: ignore

  # Emulated runners: cross-compile a static (CGO_ENABLED=0) test binary per
  # package and run it under QEMU for each non-native 64-bit arch.
  #
  # The bare Debian image carries no e2fsprogs, so the mke2fs/e2fsck/debugfs
  # round-trip tests skip cleanly (t.Skip via exec.LookPath). What still runs
  # is the pure-Go decoder/journal path. That is exactly the byte-order test:
  # the on-disk superblock / block-group-descriptor / inode / directory /
  # inline-data / block-map decoders all use explicit binary.LittleEndian
  # (109 LittleEndian sites, zero BigEndian), so on the big-endian s390x host
  # the parsed values must still come out correct.
  #
  # The QEMU jobs run with -test.short; the single slow journalled round-trip
  # (TestExt4FS_HighLevelOps, ~18s of real-time commit grace) is gated behind
  # testing.Short() so emulation stays within the timeout.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu: power9
          - arch: s390x
            image: debian:trixie
            qemu: qemu
    steps:
      - name: Checkout ext4
        uses: actions/checkout@v4
        with:
          path: ext4

      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: ext4/go.mod

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile per-package test binaries
        working-directory: ext4
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p /tmp/tests
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            # Skip packages without test files (go test -c emits no binary).
            go test -c -cover -o "/tmp/tests/${name}.test" "$pkg"
            if [ -f "/tmp/tests/${name}.test" ]; then
              echo "built ${name}.test"
            fi
          done
          ls -la /tmp/tests

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        env:
          QEMU_CPU: ${{ matrix.qemu }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(/tmp/tests/*.test)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no test binaries to run"; exit 0
          fi
          rc=0
          for bin in "${bins[@]}"; do
            echo "::group::$(basename "$bin")"
            # --user 1000:1000: never run the suite as root inside the
            # container, so permission-sensitive tests behave as on a normal
            # developer machine. -test.short skips the slow journalled
            # round-trip. -test.timeout guards against an emulation hang.
            if ! docker run --rm \
              --platform linux/${{ matrix.arch }} \
              --user 1000:1000 \
              -e QEMU_CPU="${QEMU_CPU}" \
              -v /tmp/tests:/t -w /t \
              ${{ matrix.image }} \
              "./$(basename "$bin")" -test.v -test.short -test.timeout=20m; then
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc
